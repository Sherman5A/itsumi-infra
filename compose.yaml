services:
  caddy-reverse-proxy:
    # image: shermankw/itsumi-proxy:main
    build:
     context: reverse-proxy
     dockerfile: Containerfile
    restart: unless-stopped
    networks:
      - public
      # - forgejo
      - static
      - rimgo
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
  rimgo:
    image: codeberg.org/rimgo/rimgo:1.4.2
    restart: unless-stopped
    networks:
      - rimgo
    expose:
      - 3000
    environment:
      PRIVACY_NOT_COLLECTED: 1
      PRIVACY_COUNTRY: Germany
      PRIVACY_PROVIDER: Hetzner
      PRIVACY_CLOUDFLARE: 0
