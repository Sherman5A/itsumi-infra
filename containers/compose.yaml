services:
  caddy-reverse-proxy:
    # image: shermankw/itsumi-proxy:main
    build:
      context: reverse-proxy
      dockerfile: Containerfile
    restart: unless-stopped
    networks:
      - public
      # - forgejo
      - static
      - rimgo
      - minecraft
    ports:
      - "8080:80"
      - "8443:443"
      - "25565:25565"
      - "25565:25565/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
  rimgo:
    image: codeberg.org/rimgo/rimgo:1.4.2
    networks:
      - rimgo
    expose:
      - 3000
    environment:
      PRIVACY_NOT_COLLECTED: 1
      PRIVACY_COUNTRY: Germany
      PRIVACY_PROVIDER: Hetzner
      PRIVACY_CLOUDFLARE: 0
  minecraft-server:
    image: itzg/minecraft-server:stable-java25-alpine
    tty: true
    stdin_open: true
    networks:
      - minecraft
    expose:
      - "25565"
    environment:
      EULA: "TRUE"
      VERSION: "1.20.4"
      TYPE: PAPER
      ONLINE_MODE: "true"
      USE_AIKAR_FLAGS: "true"
      USE_MEOWICE_FLAGS: "true"
      DIFFICULTY: "2"
      ENFORCE_SECURE_PROFILE: "false"
      ANNOUNCE_PLAYER_ACHIEVEMENTS: "true"
    volumes:
      # attach the relative directory 'data' to the container's /data path
      - minecraft_data:/data
